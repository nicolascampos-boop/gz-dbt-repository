version: 2

sources:
  - name: raw
    database: mi-primer-proyecto-422016
    schema: gz_raw_data
    loader: bigquery
    description: "Raw data from the Greenweez platform"
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    tables:
      - name: sales
        identifier: raw_gz_sales
      - name: product
        identifier: raw_gz_product
      - name: ship
        identifier: raw_gz_ship