version: 2

sources:
  - name: raw
    database: mi-primer-proyecto-422016
    schema: gz_raw_data
    loader: bigquery
    description: "Raw data from the Greenweez platform"
    freshness:
      warn_after: {count: 12, period: hour}
    tables:
      - name: sales
        identifier: raw_gz_sales
        description: "Sales of Greenweez. One row per product_id found in each orders_id"
        loaded_at_field: date_date
        columns:
          - name: date_date
            description: "Date of purchase"
          - name: orders_id
            description: "Unique order identifier"
          - name: products_id
            description: "Product identifier"
          - name: revenue
            description: "Revenue generated by the sale"
          - name: quantity
            description: "Quantity of products sold"
        tests:
          - unique:
              column_name: "CONCAT(orders_id, pdt_id)"

      - name: product
        identifier: raw_gz_product
        description: "Products sold by Greenweez"
        columns:
          - name: products_id
            description: "Unique product identifier"
            tests:
              - unique
              - not_null
          - name: purchase_price
            description: "Price at which Greenweez purchased the product"

      - name: ship
        identifier: raw_gz_ship
        description: "Products ship by Greenweez"
        columns:
          - name: orders_id
            description: "Unique ship identifier"
            tests:
              - unique
              - not_null
          - name: shipping_fee
            description: "Fee charged to the customer for shipping"
          - name: ship_cost
            description: "Actual cost of shipping paid by Greenweez"