version: 2

sources:
  - name: raw
    database: mi-primer-proyecto-422016
    schema: gz_raw_data
    loader: bigquery
    description: "Raw data from the Greenweez platform"
    freshness:
      warn_after: {count: 12, period: hour}
    tables:
      - name: sales
        identifier: raw_gz_sales
        description: "Sales of Greenweez. One row per product_id found in each orders_id"
        loaded_at_field: date_date
        columns:
          - name: date_date
            description: "Date of purchase"
          - name: orders_id
            description: "Unique order identifier"
          - name: products_id
            description: "Product identifier"
          - name: revenue
            description: "Revenue generated by the sale"
          - name: quantity
            description: "Quantity of products sold"
        tests:
          - unique:
              column_name: "CONCAT(orders_id, pdt_id)"

      - name: product
        identifier: raw_gz_product
        description: "Products sold by Greenweez"
        columns:
          - name: products_id
            description: "Unique product identifier"
            tests:
              - unique
              - not_null
          - name: purchase_price
            description: "Price at which Greenweez purchased the product"

      - name: ship
        identifier: raw_gz_ship
        description: "Shipping data for Greenweez orders"
        columns:
          - name: orders_id
            description: "Unique ship identifier"
            tests:
              - unique
              - not_null
          - name: shipping_fee
            description: "Fee charged to the customer for shipping"
          - name: ship_cost
            description: "Actual cost of shipping paid by Greenweez"
      - name: adwords
        identifier: raw_gz_adwords
        description: "Google Adwords advertising campaign data"
        columns:
          - name: date_date
            description: "Date of the campaign"
          - name: paid_source
            description: "Advertising platform name"
          - name: campaign_key
            description: "Unique campaign identifier"
          - name: camPGN_name
            description: "Campaign name, raw with typo"
          - name: ads_cost
            description: "Cost of ads as string, needs casting"
          - name: impression
            description: "Number of impressions"
          - name: click
            description: "Number of clicks"

      - name: bing
        identifier: raw_gz_bing
        description: "Bing advertising campaign data"
        columns:
          - name: date_date
            description: "Date of the campaign"
          - name: paid_source
            description: "Advertising platform name"
          - name: campaign_key
            description: "Unique campaign identifier"
          - name: camPGN_name
            description: "Campaign name, raw with typo"
          - name: ads_cost
            description: "Cost of ads as string, needs casting"
          - name: impression
            description: "Number of impressions"
          - name: click
            description: "Number of clicks"

      - name: criteo
        identifier: raw_gz_criteo
        description: "Criteo advertising campaign data"
        columns:
          - name: date_date
            description: "Date of the campaign"
          - name: paid_source
            description: "Advertising platform name"
          - name: campaign_key
            description: "Unique campaign identifier"
          - name: camPGN_name
            description: "Campaign name, raw with typo"
          - name: ads_cost
            description: "Cost of ads as string, needs casting"
          - name: impression
            description: "Number of impressions"
          - name: click
            description: "Number of clicks"

      - name: facebook
        identifier: raw_gz_facebook
        description: "Facebook advertising campaign data"
        columns:
          - name: date_date
            description: "Date of the campaign"
          - name: paid_source
            description: "Advertising platform name"
          - name: campaign_key
            description: "Unique campaign identifier"
          - name: camPGN_name
            description: "Campaign name, raw with typo"
          - name: ads_cost
            description: "Cost of ads as string, needs casting"
          - name: impression
            description: "Number of impressions"
          - name: click
            description: "Number of clicks"

models:
  - name: int_sales_margin
    description: "Intermediate model that calculates purchase cost and margin at the product level for each order line"
    columns:
      - name: orders_id
        description: "Order identifier"
        tests:
          - not_null
      - name: products_id
        description: "Product identifier"
        tests:
          - not_null
      - name: date_date
        description: "Date of purchase"
      - name: revenue
        description: "Revenue generated by the sale of this product in this order"
        tests:
          - not_null
      - name: quantity
        description: "Quantity of this product sold in this order"
      - name: purchase_price
        description: "Price Greenweez paid to purchase one unit of this product"
      - name: purchase_cost
        description: "Total cost of goods sold. Calculated as quantity multiplied by purchase_price"
        tests:
          - not_null
      - name: margin
        description: "Profit on this order line. Calculated as revenue minus purchase_cost"
        tests:
          - not_null
    tests:
      - unique:
          column_name: "CONCAT(orders_id, products_id)"

  - name: int_orders_margin
    description: "Intermediate model that aggregates revenue, purchase cost and margin at the order level. One row per order"
    columns:
      - name: orders_id
        description: "Unique order identifier. Primary key"
        tests:
          - unique
          - not_null
      - name: date_date
        description: "Date of the order. Taken as the most recent date when multiple products exist in the same order"
      - name: revenue
        description: "Total revenue for the order. Sum of revenue across all products in the order"
        tests:
          - not_null
      - name: purchase_cost
        description: "Total purchase cost for the order. Sum of purchase_cost across all products in the order"
        tests:
          - not_null
      - name: margin
        description: "Total margin for the order. Sum of margin across all products in the order"
        tests:
          - not_null

  - name: int_orders_operational
    description: "Intermediate model that adds shipping data to order margin. Calculates operational margin per order"
    columns:
      - name: orders_id
        description: "Unique order identifier. Primary key"
        tests:
          - unique
          - not_null
      - name: date_date
        description: "Date of the order"
      - name: revenue
        description: "Total revenue for the order"
      - name: purchase_cost
        description: "Total purchase cost for the order"
      - name: margin
        description: "Total margin for the order before shipping"
      - name: shipping_fee
        description: "Fee charged to the customer for shipping"
      - name: ship_cost
        description: "Actual cost Greenweez paid to ship the order"
      - name: operational_margin
        description: "Final margin after shipping. Calculated as margin plus shipping_fee minus ship_cost"
        tests:
          - not_null

  - name: finance_days
    description: "Mart model for the finance team. Aggregates all key financial metrics at daily granularity. One row per day"
    columns:
      - name: date_date
        description: "Date of transactions. Primary key"
        tests:
          - unique
          - not_null
      - name: nb_transactions
        description: "Number of distinct orders placed on that day"
        tests:
          - not_null
      - name: revenue
        description: "Total revenue across all orders on that day"
        tests:
          - not_null
      - name: average_basket
        description: "Average order value on that day. Calculated as total revenue divided by number of transactions"
      - name: operational_margin
        description: "Total operational margin across all orders on that day"
        tests:
          - not_null
      - name: purchase_cost
        description: "Total purchase cost across all orders on that day"
      - name: shipping_fee
        description: "Total shipping fees collected from customers on that day"
      - name: ship_cost
        description: "Total shipping costs paid by Greenweez on that day"
      - name: quantity
        description: "Total quantity of products sold on that day"
  - name: int_campaigns
    description: "Combined advertising campaign data from all four platforms. One row per campaign per day per platform"
    columns:
      - name: date_date
        description: "Date of the campaign"
        tests:
          - not_null
      - name: paid_source
        description: "Advertising platform name. One of adwords, bing, criteo or facebook"
        tests:
          - not_null
      - name: campaign_key
        description: "Campaign identifier"
        tests:
          - not_null
      - name: campaign_name
        description: "Clean campaign name with typo fixed"
        tests:
          - not_null
      - name: ads_cost
        description: "Cost of the ads in float format"
        tests:
          - not_null
      - name: impression
        description: "Number of times the ad was shown"
      - name: click
        description: "Number of times the ad was clicked"
    tests:
      - unique:
          column_name: "CONCAT(campaign_key, date_date, paid_source)"
  - name: int_campaigns_day
    description: "Daily aggregation of all advertising campaign data across all platforms"
    columns:
      - name: date_date
        description: "Date of the campaigns. Primary key"
        tests:
          - unique
          - not_null
      - name: ads_cost
        description: "Total advertising cost across all platforms and campaigns on that day"
        tests:
          - not_null
      - name: impression
        description: "Total number of impressions across all platforms and campaigns on that day"
      - name: click
        description: "Total number of clicks across all platforms and campaigns on that day"
  - name: finance_campaigns_day
    description: "Daily financial report enriched with advertising campaign data for the finance team"
    columns:
      - name: date
        description: "Date of transactions. Primary key"
        tests:
          - unique
          - not_null
      - name: revenue
        description: "Total revenue across all orders on that day"
        tests:
          - not_null
      - name: purchase_cost
        description: "Total purchase cost across all orders on that day"
      - name: margin
        description: "Total margin before shipping and advertising costs"
      - name: shipping_fee
        description: "Total shipping fees collected from customers on that day"
      - name: ship_cost
        description: "Total shipping costs paid by Greenweez on that day"
      - name: operational_margin
        description: "Total operational margin after shipping costs on that day"
      - name: average_basket
        description: "Average order value on that day"
      - name: quantity
        description: "Total quantity of products sold on that day"
      - name: ads_cost
        description: "Total advertising cost across all platforms on that day"
      - name: ads_impression
        description: "Total ad impressions across all platforms on that day"
      - name: ads_clicks
        description: "Total ad clicks across all platforms on that day"
      - name: ads_margin
        description: "Operational margin minus advertising costs. Calculated as operational_margin minus ads_cost"
        tests:
          - not_null     
  - name: finance_campaigns_month
    description: "Monthly financial report enriched with advertising data for the finance team"
    columns:
      - name: datemonth
        description: "First day of the month. Primary key"
        tests:
          - unique
          - not_null
      - name: revenue
        description: "Total revenue for the month"
        tests:
          - not_null
      - name: purchase_cost
        description: "Total purchase cost for the month"
      - name: margin
        description: "Total margin for the month before shipping and advertising"
      - name: shipping_fee
        description: "Total shipping fees collected for the month"
      - name: ship_cost
        description: "Total shipping costs paid for the month"
      - name: operational_margin
        description: "Total operational margin for the month"
      - name: average_basket
        description: "Average daily revenue for the month"
      - name: quantity
        description: "Total quantity of products sold for the month"
      - name: ads_cost
        description: "Total advertising cost for the month"
      - name: ads_impression
        description: "Total ad impressions for the month"
      - name: ads_clicks
        description: "Total ad clicks for the month"
      - name: ads_margin
        description: "Total ads margin for the month. Operational margin minus ads cost"
        tests:
          - not_null
